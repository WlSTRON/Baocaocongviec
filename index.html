<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Work Report Application</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }\n        .navbar { display: flex; background-color: #333; padding: 10px; }\n        .navbar a { color: white; padding: 14px 20px; text-decoration: none; text-align: center; }\n        .navbar a:hover { background-color: #575757; }\n        .content { margin: 20px; }\n    </style>\n</head>\n<body>\n    <div class="navbar">\n        <a href="#home" onclick="showPage('home')">Home</a>\n        <a href="#report" onclick="showPage('report')">Input Report</a>\n        <a href="#view" onclick="showPage('view')">View Reports</a>\n    </div>\n    <div class="content">\n        <div id="home" class="page">\n            <h1>Welcome to the Work Report Application</h1>\n        </div>\n        <div id="report" class="page" style="display:none;">\n            <h1>Report Input</h1>\n            <form id="reportForm">\n                <label for="workType">Work Type:</label>\n                <input type="text" id="workType" name="workType" required><br>\n                <label for="workDetails">Work Details:</label>\n                <textarea id="workDetails" name="workDetails" required></textarea><br>\n                <label for="completionStatus">Completion Status:</label>\n                <select id="completionStatus" name="completionStatus">\n                    <option value="not started">Not Started</option>\n                    <option value="in progress">In Progress</option>\n                    <option value="completed">Completed</option>\n                </select><br>\n                <label for="percentageComplete">Percentage Complete:</label>\n                <input type="number" id="percentageComplete" name="percentageComplete" min="0" max="100"><br>\n                <label for="imageUpload">Upload Image:</label>\n                <input type="file" id="imageUpload" name="imageUpload" accept="image/*"><br>\n                <button type="submit">Submit Report</button>\n            </form>\n        </div>\n        <div id="view" class="page" style="display:none;">\n            <h1>Submitted Reports</h1>\n            <div id="reportsContainer"></div>\n        </div>\n    </div>\n    <script>\n        function showPage(page) {\n            const pages = document.querySelectorAll('.page');\n            pages.forEach(p => p.style.display = 'none');\n            document.getElementById(page).style.display = 'block';\n        }\n\n        document.getElementById('reportForm').addEventListener('submit', function(event) {\n            event.preventDefault();\n            const workType = document.getElementById('workType').value;\n            const workDetails = document.getElementById('workDetails').value;\n            const completionStatus = document.getElementById('completionStatus').value;\n            const percentageComplete = document.getElementById('percentageComplete').value;\n            const imageUpload = document.getElementById('imageUpload').files[0];\n\n            const reader = new FileReader();\n            reader.onload = function(e) {\n                const report = { workType, workDetails, completionStatus, percentageComplete, image: e.target.result };\n                saveReport(report);\n            };\n            if (imageUpload) {\n                reader.readAsDataURL(imageUpload);\n            } else {\n                const report = { workType, workDetails, completionStatus, percentageComplete, image: null };\n                saveReport(report);\n            }\n        });\n\n        function saveReport(report) {\n            let reports = JSON.parse(localStorage.getItem('reports')) || [];\n            reports.push(report);\n            localStorage.setItem('reports', JSON.stringify(reports));\n            alert('Report submitted!');\n        }\n\n        function loadReports() {\n            const reports = JSON.parse(localStorage.getItem('reports')) || [];\n            const reportsContainer = document.getElementById('reportsContainer');\n            reportsContainer.innerHTML = '';\n            reports.forEach(report => {\n                const div = document.createElement('div');\n                div.innerHTML = `<h3>${report.workType}</h3> <p>${report.workDetails}</p> <p>Completion Status: ${report.completionStatus}</p> <p>Percentage Complete: ${report.percentageComplete}</p>`;\n                if (report.image) {\n                    div.innerHTML += `<img src="${report.image}" alt="Report Image" style="max-width: 100px;"/>`;\n                }\n                reportsContainer.appendChild(div);\n            });\n        }\n\n        window.onload = loadReports;\n    </script>\n</body>\n</html>
