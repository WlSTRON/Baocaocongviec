<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Góp Ý & Bình Luận</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-2: #1a1a26;
    --border: #2a2a3a;
    --accent: #f59e0b;
    --accent-glow: rgba(245, 158, 11, 0.15);
    --text: #e4e4e7;
    --text-dim: #71717a;
    --success: #22c55e;
    --danger: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(245, 158, 11, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.03) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(6, 182, 212, 0.03) 0%, transparent 50%);
    z-index: 0;
    animation: drift 20s ease-in-out infinite alternate;
  }

  @keyframes drift {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(-30px, -20px) rotate(2deg); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeUp 0.8s ease-out;
  }

  .header .icon {
    width: 64px; height: 64px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--accent), #d97706);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 20px;
    box-shadow: 0 8px 32px rgba(245, 158, 11, 0.25);
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 800;
    background: linear-gradient(135deg, #fff, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }

  .header p {
    color: var(--text-dim);
    font-size: 0.95rem;
    font-weight: 300;
  }

  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border-radius: 16px;
    padding: 4px;
    margin-bottom: 32px;
    border: 1px solid var(--border);
    animation: fadeUp 0.8s ease-out 0.1s both;
  }

  .tab-btn {
    flex: 1;
    padding: 14px 20px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 500;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .tab-btn.active {
    background: var(--surface-2);
    color: var(--accent);
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  .tab-btn:hover:not(.active) { color: var(--text); }

  .tab-btn .badge {
    background: var(--accent);
    color: var(--bg);
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 99px;
    min-width: 20px;
    text-align: center;
  }

  .panel { display: none; animation: fadeUp 0.4s ease-out; }
  .panel.active { display: block; }

  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    animation: fadeUp 0.8s ease-out 0.2s both;
  }

  .form-group { margin-bottom: 24px; }

  .form-group label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .form-group input,
  .form-group textarea {
    width: 100%;
    padding: 14px 16px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.95rem;
    transition: all 0.3s ease;
    outline: none;
  }

  .form-group input:focus,
  .form-group textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .form-group textarea {
    min-height: 140px;
    resize: vertical;
    line-height: 1.6;
  }

  .form-group input::placeholder,
  .form-group textarea::placeholder { color: #4a4a5a; }

  .submit-btn, .login-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #d97706);
    border: none;
    border-radius: 14px;
    color: #000;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
  }

  .submit-btn:hover, .login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(245, 158, 11, 0.35);
  }

  .submit-btn:active, .login-btn:active { transform: translateY(0); }
  .submit-btn.success { background: linear-gradient(135deg, var(--success), #16a34a); }
  .submit-btn:disabled, .login-btn:disabled {
    opacity: 0.5; cursor: not-allowed;
    transform: none !important; box-shadow: none !important;
  }

  .password-gate {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 32px;
    text-align: center;
  }

  .password-gate .lock-icon { font-size: 48px; margin-bottom: 16px; }
  .password-gate h3 { font-size: 1.1rem; margin-bottom: 8px; }
  .password-gate p { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 24px; }

  .password-gate input {
    width: 100%;
    padding: 14px 16px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.95rem;
    outline: none;
    margin-bottom: 16px;
    text-align: center;
    letter-spacing: 2px;
    transition: all 0.3s;
  }

  .password-gate input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .password-gate input.error {
    border-color: var(--danger);
    box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .error-msg {
    color: var(--danger);
    font-size: 0.8rem;
    margin-bottom: 12px;
    display: none;
  }

  .list-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .list-toolbar h2 { font-size: 1.1rem; font-weight: 600; }

  .toolbar-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .tool-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 14px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tool-btn:hover { color: var(--accent); border-color: var(--accent); }
  .tool-btn.spinning { animation: spin 0.6s ease; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }

  .comment-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 12px;
    transition: all 0.3s ease;
    animation: slideIn 0.4s ease-out both;
  }

  .comment-card:hover {
    border-color: #3a3a4a;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .comment-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .comment-avatar {
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
    color: #000;
    flex-shrink: 0;
  }

  .comment-info { flex: 1; min-width: 0; }

  .comment-name {
    font-weight: 600; font-size: 0.95rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .comment-time { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; }

  .comment-body {
    font-size: 0.9rem; line-height: 1.7; color: #b4b4c0;
    white-space: pre-wrap; word-break: break-word;
  }

  .loading { text-align: center; padding: 40px; color: var(--text-dim); }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 28px;
    border-radius: 14px;
    font-family: inherit; font-size: 0.9rem; font-weight: 500;
    z-index: 1000;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  .logout-btn {
    background: none;
    border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5;
    padding: 8px 14px;
    border-radius: 10px;
    font-family: inherit; font-size: 0.8rem;
    cursor: pointer; transition: all 0.3s;
  }

  .logout-btn:hover { background: rgba(239,68,68,0.1); border-color: var(--danger); }

  .download-menu { position: relative; display: inline-block; }

  .download-dropdown {
    display: none;
    position: absolute; right: 0; top: 110%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px;
    min-width: 180px;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .download-dropdown.show { display: block; }

  .download-option {
    display: block; width: 100%;
    padding: 10px 14px;
    background: none; border: none;
    color: var(--text);
    font-family: inherit; font-size: 0.85rem;
    text-align: left; cursor: pointer;
    border-radius: 8px; transition: background 0.2s;
  }

  .download-option:hover { background: rgba(245, 158, 11, 0.1); color: var(--accent); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="icon">💬</div>
    <h1>Góp Ý & Bình Luận</h1>
    <p>Chia sẻ ý kiến của bạn — mọi đóng góp đều có giá trị</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('write')">
      ✏️ Gửi ý kiến
    </button>
    <button class="tab-btn" onclick="switchTab('list')">
      🔒 Danh sách <span class="badge" id="countBadge">0</span>
    </button>
  </div>

  <!-- WRITE PANEL -->
  <div class="panel active" id="panel-write">
    <div class="form-card">
      <div class="form-group">
        <label>Tên của bạn</label>
        <input type="text" id="inputName" placeholder="Nhập tên hoặc nickname..." maxlength="50">
      </div>
      <div class="form-group">
        <label>Nội dung ý kiến</label>
        <textarea id="inputComment" placeholder="Viết ý kiến, góp ý, bình luận của bạn tại đây..." maxlength="2000"></textarea>
      </div>
      <button class="submit-btn" id="submitBtn" onclick="submitComment()">
        Gửi ý kiến →
      </button>
    </div>
  </div>

  <!-- LIST PANEL -->
  <div class="panel" id="panel-list">
    <div id="passwordGate" class="password-gate">
      <div class="lock-icon">🔐</div>
      <h3>Nhập mật khẩu để xem danh sách</h3>
      <p>Chỉ quản trị viên mới có thể xem và tải danh sách ý kiến</p>
      <input type="password" id="passwordInput" placeholder="••••••••"
             onkeydown="if(event.key==='Enter') checkPassword()">
      <div class="error-msg" id="pwError">Sai mật khẩu, thử lại!</div>
      <button class="login-btn" onclick="checkPassword()">Mở khóa →</button>
    </div>

    <div id="commentArea" style="display:none">
      <div class="list-toolbar">
        <h2>Tất cả ý kiến <span id="listCount" style="color:var(--text-dim);font-size:0.85rem"></span></h2>
        <div class="toolbar-actions">
          <button class="tool-btn" onclick="refreshComments()" id="refreshBtn">🔄 Làm mới</button>
          <div class="download-menu">
            <button class="tool-btn" onclick="toggleDownload()">📥 Tải xuống</button>
            <div class="download-dropdown" id="downloadDropdown">
              <button class="download-option" onclick="downloadCSV()">📊 File CSV (Excel)</button>
              <button class="download-option" onclick="downloadTXT()">📄 File TXT</button>
              <button class="download-option" onclick="downloadJSON()">🗂 File JSON</button>
            </div>
          </div>
          <button class="logout-btn" onclick="lockList()">🔒 Khóa</button>
        </div>
      </div>
      <div id="commentList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_KEY = '$2a$10$65YD82ayi/PZCOfuf/eohut0VuRbtssN8OYcspywbes26Dx.bkeqq';
const BIN_ID = '69da3e29856a6821892153f4';
const ADMIN_PASSWORD = 'Wistron020226';
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

let allComments = [];

// --- LOAD ---
async function loadComments() {
  try {
    const res = await fetch(API_URL + '/latest', {
      headers: { 'X-Master-Key': API_KEY }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    let record = data.record;

    if (Array.isArray(record)) {
      allComments = record.filter(item =>
        item && typeof item === 'object' && item.name && item.text
      );
    } else if (record && typeof record === 'object' && record.comments) {
      allComments = record.comments;
    } else {
      allComments = [];
    }
    return allComments;
  } catch (err) {
    console.error('Load error:', err);
    showToast('Lỗi tải dữ liệu, thử lại');
    return [];
  }
}

// --- SAVE ---
async function saveComments(comments) {
  const res = await fetch(API_URL, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': API_KEY
    },
    body: JSON.stringify(comments)
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
}

// --- PASSWORD ---
function checkPassword() {
  const input = document.getElementById('passwordInput');
  const error = document.getElementById('pwError');
  if (input.value === ADMIN_PASSWORD) {
    document.getElementById('passwordGate').style.display = 'none';
    document.getElementById('commentArea').style.display = 'block';
    refreshComments();
  } else {
    input.classList.add('error');
    error.style.display = 'block';
    setTimeout(() => input.classList.remove('error'), 400);
  }
}

function lockList() {
  document.getElementById('passwordGate').style.display = 'block';
  document.getElementById('commentArea').style.display = 'none';
  document.getElementById('passwordInput').value = '';
  document.getElementById('pwError').style.display = 'none';
  showToast('🔒 Đã khóa danh sách');
}

// --- DOWNLOAD ---
function toggleDownload() {
  document.getElementById('downloadDropdown').classList.toggle('show');
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.download-menu'))
    document.getElementById('downloadDropdown').classList.remove('show');
});

function downloadCSV() {
  if (!allComments.length) { showToast('Chưa có dữ liệu'); return; }
  let csv = '\uFEFF' + 'STT,Tên,Nội dung,Thời gian\n';
  allComments.forEach((c, i) => {
    const name = '"' + (c.name||'').replace(/"/g,'""') + '"';
    const text = '"' + (c.text||'').replace(/"/g,'""').replace(/\n/g,' ') + '"';
    const date = '"' + new Date(c.date).toLocaleString('vi-VN') + '"';
    csv += `${i+1},${name},${text},${date}\n`;
  });
  downloadFile(csv, 'danh-sach-y-kien.csv', 'text/csv;charset=utf-8');
}

function downloadTXT() {
  if (!allComments.length) { showToast('Chưa có dữ liệu'); return; }
  let txt = '══════════════════════════════════\n';
  txt += '    DANH SÁCH Ý KIẾN GÓP Ý\n';
  txt += '    Ngày xuất: ' + new Date().toLocaleString('vi-VN') + '\n';
  txt += '    Tổng: ' + allComments.length + ' ý kiến\n';
  txt += '══════════════════════════════════\n\n';
  allComments.forEach((c, i) => {
    txt += `--- #${i+1} ---\n`;
    txt += `Người gửi: ${c.name}\n`;
    txt += `Lúc: ${new Date(c.date).toLocaleString('vi-VN')}\n`;
    txt += `Nội dung:\n${c.text}\n\n`;
  });
  downloadFile(txt, 'danh-sach-y-kien.txt', 'text/plain;charset=utf-8');
}

function downloadJSON() {
  if (!allComments.length) { showToast('Chưa có dữ liệu'); return; }
  downloadFile(JSON.stringify(allComments, null, 2), 'danh-sach-y-kien.json', 'application/json;charset=utf-8');
}

function downloadFile(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  document.getElementById('downloadDropdown').classList.remove('show');
  showToast('✅ Đã tải ' + filename);
}

// --- UI ---
const colors = ['#f59e0b','#ef4444','#8b5cf6','#06b6d4','#22c55e','#ec4899','#f97316','#6366f1'];

function avatarColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  return colors[Math.abs(h) % colors.length];
}

function initials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).slice(0,2).join('').toUpperCase();
}

function timeAgo(d) {
  const m = Math.floor((Date.now() - new Date(d).getTime()) / 60000);
  if (m < 1) return 'Vừa xong';
  if (m < 60) return m + ' phút trước';
  const h = Math.floor(m / 60);
  if (h < 24) return h + ' giờ trước';
  const days = Math.floor(h / 24);
  if (days < 30) return days + ' ngày trước';
  return new Date(d).toLocaleDateString('vi-VN');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function updateBadge() {
  document.getElementById('countBadge').textContent = allComments.length;
  document.getElementById('listCount').textContent = '(' + allComments.length + ' ý kiến)';
}

function renderComments() {
  const el = document.getElementById('commentList');
  if (!allComments.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>Chưa có ý kiến nào.</p></div>';
    return;
  }
  el.innerHTML = allComments.map((c, i) => `
    <div class="comment-card" style="animation-delay:${Math.min(i*0.05,0.5)}s">
      <div class="comment-meta">
        <div class="comment-avatar" style="background:${avatarColor(c.name)}">${initials(c.name)}</div>
        <div class="comment-info">
          <div class="comment-name">${esc(c.name)}</div>
          <div class="comment-time">${timeAgo(c.date)}</div>
        </div>
      </div>
      <div class="comment-body">${esc(c.text)}</div>
    </div>`).join('');
}

// --- TABS ---
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active', tab === 'write' ? i === 0 : i === 1));
  document.getElementById('panel-write').classList.toggle('active', tab === 'write');
  document.getElementById('panel-list').classList.toggle('active', tab === 'list');
}

// --- REFRESH ---
async function refreshComments() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('commentList').innerHTML =
    '<div class="loading"><div class="spinner"></div>Đang tải...</div>';
  await loadComments();
  updateBadge();
  renderComments();
  setTimeout(() => btn.classList.remove('spinning'), 600);
}

// --- SUBMIT ---
async function submitComment() {
  const nameEl = document.getElementById('inputName');
  const textEl = document.getElementById('inputComment');
  const btn = document.getElementById('submitBtn');
  const name = nameEl.value.trim();
  const text = textEl.value.trim();

  if (!name) { showToast('Vui lòng nhập tên'); nameEl.focus(); return; }
  if (!text) { showToast('Vui lòng nhập nội dung'); textEl.focus(); return; }

  btn.disabled = true;
  btn.textContent = 'Đang gửi...';

  try {
    await loadComments();
    allComments.unshift({ name, text, date: new Date().toISOString() });
    await saveComments(allComments);

    btn.textContent = '✓ Đã gửi!';
    btn.classList.add('success');
    nameEl.value = '';
    textEl.value = '';
    updateBadge();
    showToast('✅ Gửi thành công!');

    setTimeout(() => {
      btn.textContent = 'Gửi ý kiến →';
      btn.classList.remove('success');
      btn.disabled = false;
    }, 1500);
  } catch (err) {
    console.error(err);
    btn.textContent = 'Gửi ý kiến →';
    btn.disabled = false;
    showToast('Lỗi khi gửi, thử lại');
  }
}

// --- INIT ---
(async () => {
  await loadComments();
  updateBadge();
})();
</script>
</body>
